<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>玻璃态个人中心 | 圆角透明设计</title>
    <!-- 引入 Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1a2a3a, #0a0f1a);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* 装饰性背景光晕，增强玻璃质感 */
        body::before {
            content: "";
            position: absolute;
            top: 20%;
            left: -10%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(100, 150, 250, 0.3), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: 10%;
            right: -5%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(200, 100, 220, 0.25), transparent 70%);
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }

        /* 主容器：玻璃卡片层叠感 */
        .glass-container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 通用玻璃卡片样式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.35);
        }

        /* 头部个人资料区域 (头像+基本信息) */
        .profile-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2rem;
            padding: 2rem 2.2rem;
            margin-bottom: 2rem;
        }

        .avatar-wrapper {
            position: relative;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 3px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }

        /* 在线状态小点 */
        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: #2ecc71;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.5);
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: white;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            margin-bottom: 0.3rem;
        }

        .profile-bio {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            margin: 0.6rem 0 1rem 0;
            line-height: 1.4;
            max-width: 90%;
        }

        .edit-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .edit-btn i {
            font-size: 0.8rem;
        }

        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.97);
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* 统计数据卡片组 (三列) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: rgba(20, 30, 45, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            padding: 1.2rem 0.8rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s;
        }

        .stat-item:hover {
            background: rgba(40, 55, 80, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        /* 功能区域: 双栏布局 (我的菜单 + 近期动态) */
        .dashboard-row {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1.5rem;
        }

        /* 通用玻璃卡片内部样式 */
        .section-card {
            padding: 1.6rem 1.8rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid #5c9eff;
            padding-left: 0.8rem;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.85);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            color: white;
            transform: translateX(6px);
            background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
            padding-left: 8px;
            border-radius: 12px;
        }

        .menu-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
        }

        .menu-text {
            font-weight: 500;
            flex: 1;
        }

        .menu-badge {
            background: rgba(92, 158, 255, 0.3);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            backdrop-filter: blur(2px);
        }

        /* 动态卡片样式 */
        .activity-item {
            display: flex;
            gap: 0.9rem;
            margin-bottom: 1.2rem;
            padding: 0.6rem 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .activity-icon {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #aac9ff;
        }

        .activity-content {
            flex: 1;
        }

        .activity-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 底部社交链接 */
        .social-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .social-icon {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            text-decoration: none;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 响应式布局 */
        @media (max-width: 780px) {
            body {
                padding: 1.2rem;
            }
            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 1.8rem 1.2rem;
                gap: 1rem;
            }
            .profile-bio {
                max-width: 100%;
                text-align: center;
            }
            .edit-btn {
                margin-top: 0.2rem;
            }
            .stats-grid {
                gap: 0.8rem;
            }
            .stat-number {
                font-size: 1.6rem;
            }
            .dashboard-row {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .section-card {
                padding: 1.3rem 1.2rem;
            }
            .avatar {
                width: 90px;
                height: 90px;
            }
            .profile-info h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            .stat-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.8rem 1.5rem;
            }
            .stat-number {
                font-size: 1.5rem;
            }
            .stat-label {
                font-size: 0.8rem;
                margin-top: 0;
            }
        }

        /* 自定义滚动条(可选) */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="glass-container">
    <!-- 个人资料卡片 (毛玻璃大卡片) -->
    <div class="glass-card profile-header">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://randomuser.me/api/portraits/women/68.jpg" alt="用户头像" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah'">
            <span class="status-dot"></span>
        </div>
        <div class="profile-info">
            <h1>林语晨 <span style="font-size: 1rem; font-weight: normal;">✨</span></h1>
            <div class="profile-bio">
                <i class="fas fa-map-marker-alt" style="margin-right: 6px; opacity: 0.8;"></i> 上海 · 创意设计师 <br>
                “设计触达人心，代码构建未来”
            </div>
            <button class="edit-btn" id="editProfileBtn"><i class="fas fa-pen"></i> 编辑资料</button>
        </div>
        <!-- 可选额外小装饰 -->
        <div style="font-size: 2rem; opacity: 0.3; pointer-events: none;">
            <i class="fas fa-gem"></i>
        </div>
    </div>

    <!-- 统计数据三栏 -->
    <div class="stats-grid">
        <div class="stat-item">
            <div class="stat-number">1,284</div>
            <div class="stat-label"><i class="fas fa-heart" style="margin-right: 4px;"></i> 获赞</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">346</div>
            <div class="stat-label"><i class="fas fa-users"></i> 关注者</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">128</div>
            <div class="stat-label"><i class="fas fa-camera"></i> 作品</div>
        </div>
    </div>

    <!-- 主要功能区域：菜单 + 动态 -->
    <div class="dashboard-row">
        <!-- 左侧：功能菜单 -->
        <div class="glass-card section-card">
            <div class="section-title">
                <i class="fas fa-compass"></i> 快捷中心
            </div>
            <ul class="menu-list">
                <li class="menu-item">
                    <div class="menu-icon"><i class="fas fa-user-circle"></i></div>
                    <span class="menu-text">个人主页</span>
                    <span class="menu-badge">新</span>
                </li>
                <li class="menu-item">
                    <div class="menu-icon"><i class="fas fa-images"></i></div>
                    <span class="menu-text">作品集</span>
                    <span class="menu-badge">12更新</span>
                </li>
                <li class="menu-item">
                    <div class="menu-icon"><i class="fas fa-envelope"></i></div>
                    <span class="menu-text">消息中心</span>
                    <span class="menu-badge">3</span>
                </li>
                <li class="menu-item">
                    <div class="menu-icon"><i class="fas fa-cog"></i></div>
                    <span class="menu-text">账户设置</span>
                    <span class="menu-badge"></span>
                </li>
                <li class="menu-item">
                    <div class="menu-icon"><i class="fas fa-moon"></i></div>
                    <span class="menu-text">夜间模式</span>
                    <span class="menu-badge">实验</span>
                </li>
            </ul>
            <!-- 简单装饰按钮 -->
            <div style="margin-top: 1rem; text-align: center;">
                <span style="background: rgba(255,255,255,0.1); border-radius: 30px; padding: 0.3rem 1rem; font-size: 0.75rem; color: rgba(255,255,255,0.6);"><i class="fas fa-shield-alt"></i> 隐私保护 · 在线</span>
            </div>
        </div>

        <!-- 右侧：近期动态 & 活跃 -->
        <div class="glass-card section-card">
            <div class="section-title">
                <i class="fas fa-bell"></i> 最新动态
            </div>
            <div class="activity-item">
                <div class="activity-icon"><i class="fas fa-thumbs-up"></i></div>
                <div class="activity-content">
                    <div class="activity-text">你设计的《玻璃态UI概念》获得<span style="color: #ffd966;"> 68个赞</span> 🔥</div>
                    <div class="activity-time"><i class="far fa-clock"></i> 2小时前</div>
                </div>
            </div>
            <div class="activity-item">
                <div class="activity-icon"><i class="fas fa-comment"></i></div>
                <div class="activity-content">
                    <div class="activity-text">@陈逸飞 评论了你的作品：“太有质感了，玻璃效果通透”</div>
                    <div class="activity-time"><i class="far fa-clock"></i> 昨天 15:42</div>
                </div>
            </div>
            <div class="activity-item">
                <div class="activity-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="activity-content">
                    <div class="activity-text">新项目 “Glassmorphism Dashboard” 已发布</div>
                    <div class="activity-time"><i class="far fa-clock"></i> 3天前</div>
                </div>
            </div>
            <div class="activity-item">
                <div class="activity-icon"><i class="fas fa-trophy"></i></div>
                <div class="activity-content">
                    <div class="activity-text">完成设计挑战，获得“灵感大师”徽章 🏅</div>
                    <div class="activity-time"><i class="far fa-calendar-alt"></i> 上周</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 社交平台链接栏 -->
    <div class="social-links">
        <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-dribbble"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-behance"></i></a>
    </div>
    <div style="text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.5; color: white;">
        🌟 圆角玻璃设计 · 沉浸式个人中心
    </div>
</div>

<!-- 简单交互：编辑资料模拟弹窗提示（纯趣味交互，不涉及后端） -->
<script>
    (function() {
        // 优雅提醒，展示毛玻璃风格的alert模拟（不用原生alert破坏美感）
        const editBtn = document.getElementById('editProfileBtn');
        if (editBtn) {
            editBtn.addEventListener('click', function(e) {
                // 创建临时toast风格提示
                const toast = document.createElement('div');
                toast.innerText = '✨ 资料编辑功能即将开放，演示交互 ✨';
                toast.style.position = 'fixed';
                toast.style.bottom = '25px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.background = 'rgba(20, 30, 45, 0.85)';
                toast.style.backdropFilter = 'blur(12px)';
                toast.style.color = 'white';
                toast.style.padding = '12px 24px';
                toast.style.borderRadius = '60px';
                toast.style.fontSize = '0.9rem';
                toast.style.fontWeight = '500';
                toast.style.border = '1px solid rgba(255,255,255,0.3)';
                toast.style.zIndex = '9999';
                toast.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
                toast.style.letterSpacing = '0.5px';
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 400);
                }, 2000);
            });
        }

        // 给所有菜单项添加点击提示（可选，演示用，不干扰实际使用）
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('click', function() {
                const text = this.querySelector('.menu-text')?.innerText || '功能';
                const msg = `✨ 导航至「${text}」 ✨\n(演示效果，完整功能开发中)`;
                // 优雅轻提示
                const tip = document.createElement('div');
                tip.innerText = msg;
                tip.style.position = 'fixed';
                tip.style.bottom = '25px';
                tip.style.left = '50%';
                tip.style.transform = 'translateX(-50%)';
                tip.style.background = 'rgba(0,0,0,0.7)';
                tip.style.backdropFilter = 'blur(8px)';
                tip.style.color = '#f0f0f0';
                tip.style.padding = '8px 20px';
                tip.style.borderRadius = '40px';
                tip.style.fontSize = '0.85rem';
                tip.style.border = '1px solid rgba(255,255,255,0.2)';
                tip.style.zIndex = '9999';
                tip.style.pointerEvents = 'none';
                document.body.appendChild(tip);
                setTimeout(() => {
                    tip.style.opacity = '0';
                    setTimeout(() => tip.remove(), 500);
                }, 1500);
            });
        });
    })();
</script>
</body>
</html>
